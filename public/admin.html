<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin – Wellness Tracker</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<header>
  <h1>Admin</h1>
  <div class="header-actions">
    <span id="admin-whoami" class="meta"></span>
    <button id="admin-logout-btn">Log out</button>
  </div>
</header>

<main class="admin-main">
  <section class="panel">
    <h2>Add user</h2>
    <form id="add-user-form">
      <input type="text" id="new-user-name" placeholder="Full name" required>
      <button type="submit">Add user</button>
    </form>
    <p id="add-user-msg" class="meta" hidden></p>
  </section>

  <section class="panel">
    <h2>Activity report</h2>

    <form id="filter-form" class="filters">
      <select id="f-category">
        <option value="">All categories</option>
        <option value="physical wellness">Physical wellness</option>
        <option value="mental wellness">Mental wellness</option>
        <option value="intellectual wellness">Intellectual wellness</option>
      </select>

      <select id="f-user">
        <option value="">All users</option>
      </select>

      <input type="date" id="f-date-from" title="From date">
      <input type="date" id="f-date-to" title="To date">

      <input type="text" id="f-search" placeholder="Search caption">

      <select id="f-sort-by">
        <option value="created_at">Sort: date</option>
        <option value="category">Sort: category</option>
      </select>

      <select id="f-sort-dir">
        <option value="desc">Descending</option>
        <option value="asc">Ascending</option>
      </select>

      <select id="f-page-size">
        <option value="10">10 / page</option>
        <option value="25" selected>25 / page</option>
        <option value="50">50 / page</option>
        <option value="100">100 / page</option>
      </select>

      <button type="submit">Apply</button>
      <button type="button" id="f-reset">Reset</button>
    </form>

    <div class="report-meta">
      <span id="report-count" class="meta"></span>
      <div class="pagination">
        <button type="button" id="page-prev">Prev</button>
        <span id="page-info" class="meta"></span>
        <button type="button" id="page-next">Next</button>
      </div>
    </div>

    <div class="table-wrap">
      <table id="report-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>User</th>
            <th>Category</th>
            <th>Caption</th>
            <th>Photos</th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
      </table>
    </div>
  </section>
</main>

<script src="admin.js"></script>
</body>
</html>
